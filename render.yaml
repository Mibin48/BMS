services:
  - type: web
    name: hema-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        placeholder: "Aiven MySQL Hostname"
      - key: DB_USER
        value: avnadmin
      - key: DB_PASSWORD
        placeholder: "Aiven MySQL Password"
      - key: DB_NAME
        value: defaultdb
      - key: DB_PORT
        placeholder: "Aiven MySQL Port (usually 25470)"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        placeholder: "Deployed Vercel URL (e.g. https://hema-client.vercel.app)"
